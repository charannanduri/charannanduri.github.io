name: Monthly Projects Update

on:
  schedule:
    - cron: '0 13 1 * *' # 1st of each month, 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-projects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check GitHub activity and update projects.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/update-projects.mjs

      - name: Commit and push if projects.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- projects.json; then
            git add projects.json
            git commit -m "Add new projects from GitHub activity"
            git push
          else
            echo "No changes to projects.json"
          fi
